name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Audit dependencies
        # GHSA-3ppc-4f35-3m26: minimatch ReDoS in eslint/typescript-eslint dev transitive dep (no upstream fix yet)
        # GHSA-2g4f-4pwh-qvx6: ajv ReDoS in eslint/commitlint dev transitive dep (no upstream fix yet)
        run: bun audit --ignore=GHSA-3ppc-4f35-3m26 --ignore=GHSA-2g4f-4pwh-qvx6
